<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - GBLS Literature Reviewer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      max-width: 450px;
      width: 100%;
      padding: 40px;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .auth-header h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #333;
    }

    .auth-header p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .oauth-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .oauth-btn {
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: white;
      color: #333;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-decoration: none;
    }

    .oauth-btn:hover {
      border-color: #667eea;
      background: #f8f9ff;
    }

    .oauth-btn.github {
      border-color: #24292e;
    }

    .oauth-btn.github:hover {
      background: #f6f8fa;
    }

    .oauth-btn.google {
      border-color: #dadce0;
    }

    .oauth-btn.google:hover {
      background: #f8f9fa;
    }

    .divider {
      text-align: center;
      margin: 20px 0;
      font-size: 12px;
      color: #999;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #eee;
    }

    .divider::before {
      left: 0;
    }

    .divider::after {
      right: 0;
    }

    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    button[type="submit"]:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .signup-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }

    .signup-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }

    .error-message {
      color: #e74c3c;
      font-size: 13px;
      margin-top: 5px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .info-message {
      background: #ecf0f1;
      color: #2c3e50;
      padding: 12px;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-header">
      <h1>GBLS Literature Reviewer</h1>
      <p>Sign in to your account</p>
    </div>

    <div class="oauth-buttons">
      <a href="/auth/github" class="oauth-btn github">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        GitHub
      </a>
      <a href="/auth/google" class="oauth-btn google">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M15.5 8.2c0-.5-.1-1-.2-1.5H8v2.8h4.4c-.2 1-.8 1.9-1.6 2.5v2h2.6c1.5-1.4 2.4-3.4 2.4-5.8z" fill="#4285F4"/>
          <path d="M8 16c2.1 0 3.9-.7 5.2-1.9l-2.6-2c-.7.5-1.6.8-2.6.8-2 0-3.7-1.3-4.3-3.2H1v2.6C2.3 15 5 16 8 16z" fill="#34A853"/>
          <path d="M3.7 9.7c-.3-.5-.4-1-.4-1.7s.1-1.2.4-1.7V3.7H1C.3 5.1 0 6.5 0 8s.3 2.9 1 4.3l2.7-2.6z" fill="#FBBC04"/>
          <path d="M8 3.1c1.1 0 2.1.4 2.9 1.2l2.2-2.2C11.8.6 10.1 0 8 0 5 0 2.3 1 1 3.7l2.7 2.6c.6-1.9 2.3-3.2 4.3-3.2z" fill="#EA4335"/>
        </svg>
        Google
      </a>
    </div>

    <div class="divider">or sign in with email</div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" id="email" required placeholder="jane@example.com">
      </div>

      <button type="submit">Sign In</button>
      <div class="error-message" id="formError"></div>
    </form>

    <div class="signup-link">
      Don't have an account? <a href="/register">Create one now</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const formError = document.getElementById('formError');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      formError.textContent = '';
      formError.classList.remove('show');

      const email = emailInput.value.trim();

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Sign in failed');
        }

        // Redirect to dashboard on success
        window.location.href = '/';
      } catch (error) {
        formError.textContent = error.message;
        formError.classList.add('show');
      }
    });
  </script>
</body>
</html>
